name: Supabase Keepalive

on:
  schedule:
    - cron: "0 13 */3 * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.SUPABASE_DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate keepalive configuration
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Missing GitHub Actions secret: set DATABASE_URL (preferred) or SUPABASE_DATABASE_URL."
            exit 1
          fi

      - name: Run Supabase keepalive query
        run: pnpm keepalive:supabase
